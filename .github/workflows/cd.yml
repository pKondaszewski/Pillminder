name: Continuous Delivery

on:
  push:
    branches: [ main ]
#  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v4

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: Cache Android NDK & CMake
        uses: actions/cache@v4
        with:
          path: |
            ${{ env.ANDROID_HOME }}/ndk
            ${{ env.ANDROID_HOME }}/cmake
          key: android-sdk-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
          restore-keys: android-sdk-${{ runner.os }}-

      - name: Install dependencies
        run: npm ci

      - name: Prebuild (generate native android project)
        run: npx expo prebuild --platform android --no-install

      - name: Build release APK
        working-directory: android
        run: ./gradlew assembleRelease --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v7
        with:
          name: pillminder-apk
          path: android/app/build/outputs/apk/release/*.apk
          if-no-files-found: error
